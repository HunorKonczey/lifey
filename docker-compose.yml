services:
  postgres:
    image: postgres:16
    container_name: lifey-postgres
    environment:
      POSTGRES_DB: lifey
      POSTGRES_USER: lifey
      POSTGRES_PASSWORD: lifey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifey"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: lifey-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifey
      SPRING_DATASOURCE_USERNAME: lifey
      SPRING_DATASOURCE_PASSWORD: lifey
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-onboarding@resend.dev}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
