name: lifey
description: Fitness and nutrition tracker mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.5.0
  intl: ^0.20.2
  flutter_secure_storage: ^10.3.1
  # Offline-first local cache (see lib/core/local_db/). Chosen over Isar:
  # Isar 3.1.0 lacks an Android `namespace` and breaks AGP 8 builds, and
  # Isar 4.x was still unstable when this was picked.
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0
  uuid: ^4.4.0
  # Drives the SyncEngine: fires on connectivity restore so queued writes go
  # out without the user needing to pull-to-refresh.
  connectivity_plus: ^7.1.1
  mobile_scanner: ^7.2.0
  # Apple Health / HealthKit integration (iOS only — see lib/core/health/ and
  # docs/16-apple-health-integration-plan.md). All reads go through HealthService,
  # which no-ops on non-iOS. Pinned to 13.x; its device_info_plus transitive dep
  # downgrades win32/flutter_secure_storage_windows, which only affects the
  # (unused) Windows desktop target.
  health: 13.0.0
  # Posts the "Apple Fitness workout finished" notification (Phase 1 pairing
  # entry point) once HealthKit hands us a completed strength workout.
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true
