name: lifey
description: Fitness and nutrition tracker mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.5.0
  intl: ^0.20.2
  flutter_secure_storage: ^10.3.1
  # Offline/local storage will be added when the offline feature lands.
  # Avoid Isar 3.1.0 — it lacks an Android `namespace` and breaks AGP 8 builds.
  # Use an AGP-8-compatible option then (e.g. drift, hive_ce, or Isar 4.x).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
