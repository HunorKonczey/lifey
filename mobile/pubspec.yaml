name: lifey
description: Fitness and nutrition tracker mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  intl: ^0.19.0
  # Offline/local storage will be added when the offline feature lands.
  # Avoid Isar 3.1.0 — it lacks an Android `namespace` and breaks AGP 8 builds.
  # Use an AGP-8-compatible option then (e.g. drift, hive_ce, or Isar 4.x).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
