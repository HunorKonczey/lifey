spring:
  application:
    name: lifey-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifey}
    username: ${SPRING_DATASOURCE_USERNAME:lifey}
    password: ${SPRING_DATASOURCE_PASSWORD:lifey}
    hikari:
      # Default is 10 — each pooled connection holds buffers on both this
      # app's and Postgres' side, not worth it for a low-traffic free-tier
      # deployment with a capped heap.
      maximum-pool-size: 5
      # Let the pool shrink to zero connections when idle, and do it well
      # within Railway's ~10-minute Serverless inactivity window — a pool
      # that always keeps a connection open to Postgres is itself outbound
      # traffic, which stops the service from ever being seen as idle and
      # put to sleep.
      minimum-idle: 0
      idle-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Railway (and most PaaS hosts) assign the container a port at runtime via
  # $PORT and route their public proxy to it — the app must bind to that, not
  # a fixed port. Falls back to 8080 for local/dev where $PORT isn't set.
  port: ${PORT:8080}
  tomcat:
    threads:
      # Default max is 200 — each thread reserves its own stack, which adds
      # up fast against a capped heap. 200 concurrent requests is far more
      # than this deployment needs anyway.
      max: 50

springdoc:
  swagger-ui:
    path: /swagger-ui.html

lifey:
  jwt:
    # Dev-only default. MUST be overridden via JWT_SECRET in any shared/production
    # environment — anyone with this value can forge access tokens for any user.
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-please-change-me-1234567890}
    access-token-ttl: ${JWT_ACCESS_TTL:7d}
    refresh-token-ttl: ${JWT_REFRESH_TTL:30d}
    issuer: lifey-api
  openfoodfacts:
    base-url: ${OPENFOODFACTS_BASE_URL:https://world.openfoodfacts.org}
    # OpenFoodFacts requires a descriptive User-Agent identifying the app and a
    # contact. Override the contact in deployments via OPENFOODFACTS_USER_AGENT.
    user-agent: ${OPENFOODFACTS_USER_AGENT:Lifey/1.0 (hunorkonczey@gmail.com)}
