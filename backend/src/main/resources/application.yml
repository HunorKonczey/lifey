spring:
  application:
    name: lifey-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifey}
    username: ${SPRING_DATASOURCE_USERNAME:lifey}
    password: ${SPRING_DATASOURCE_PASSWORD:lifey}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
