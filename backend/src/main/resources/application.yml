spring:
  application:
    name: lifey-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifey}
    username: ${SPRING_DATASOURCE_USERNAME:lifey}
    password: ${SPRING_DATASOURCE_PASSWORD:lifey}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Railway (and most PaaS hosts) assign the container a port at runtime via
  # $PORT and route their public proxy to it — the app must bind to that, not
  # a fixed port. Falls back to 8080 for local/dev where $PORT isn't set.
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

lifey:
  jwt:
    # Dev-only default. MUST be overridden via JWT_SECRET in any shared/production
    # environment — anyone with this value can forge access tokens for any user.
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-please-change-me-1234567890}
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:30d}
    issuer: lifey-api
