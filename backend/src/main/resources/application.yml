spring:
  application:
    name: lifey-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifey}
    username: ${SPRING_DATASOURCE_USERNAME:lifey}
    password: ${SPRING_DATASOURCE_PASSWORD:lifey}
    hikari:
      # Default is 10 — each pooled connection holds buffers on both this
      # app's and Postgres' side, not worth it for a low-traffic free-tier
      # deployment with a capped heap.
      maximum-pool-size: 5
      # Let the pool shrink to zero connections when idle, and do it well
      # within Railway's ~10-minute Serverless inactivity window — a pool
      # that always keeps a connection open to Postgres is itself outbound
      # traffic, which stops the service from ever being seen as idle and
      # put to sleep.
      # minimum-idle: 0
      # idle-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      # Profile picture and recipe photo uploads (docs/22-profile-picture-plan.md)
      # — well above a re-encoded image but small enough to bound memory per
      # request, and generous enough for a camera photo before the server resizes it.
      # Sonar (java:S5693) flags this as above its generic 8MB DoS-prevention
      # default — reviewed and accepted: both upload endpoints require
      # authentication (not anonymous/public), accept one file per request,
      # and re-encode/resize the image server-side immediately after upload
      # (see ImageReencoder), so 10MB buys real camera-photo headroom without
      # a meaningfully larger abuse surface than 8MB would.
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Railway (and most PaaS hosts) assign the container a port at runtime via
  # $PORT and route their public proxy to it — the app must bind to that, not
  # a fixed port. Falls back to 8080 for local/dev where $PORT isn't set.
  port: ${PORT:8080}
  tomcat:
    threads:
      # Default max is 200 — each thread reserves its own stack, which adds
      # up fast against a capped heap. 200 concurrent requests is far more
      # than this deployment needs anyway.
      max: 50

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      # Only expose the health endpoint over HTTP (at /actuator/health) — nothing
      # else (env, beans, mappings, ...) is reachable, so no internals leak.
      exposure:
        include: health
  endpoint:
    health:
      # Plain UP/DOWN for unauthenticated callers — don't leak component details
      # (db, disk, ...) on a public health-check endpoint.
      show-details: never
      # Adds /actuator/health/liveness and /readiness groups for PaaS probes.
      probes:
        enabled: true

lifey:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    # Secure must be true in production (HTTPS). Left false for local http dev,
    # otherwise the browser won't store/send the refresh cookie over http.
    secure: ${COOKIE_SECURE:false}
    # Lax works when web and API share a site (e.g. localhost:3000 ↔ localhost:8080,
    # or app.example.com ↔ api.example.com). Use None (with secure=true) for cross-site.
    same-site: ${COOKIE_SAME_SITE:Lax}
  jwt:
    # Dev-only default. MUST be overridden via JWT_SECRET in any shared/production
    # environment — anyone with this value can forge access tokens for any user.
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-please-change-me-1234567890}
    access-token-ttl: ${JWT_ACCESS_TTL:7d}
    refresh-token-ttl: ${JWT_REFRESH_TTL:30d}
    issuer: lifey-api
  starter-catalog:
    # Seeds every newly registered user with a starter exercise catalog
    # (StarterCatalogListener) — handy for local dev/demo accounts, but real
    # users shouldn't have the same handful of exercises forced onto them.
    # Off in prod (application-prod.yml).
    enabled: ${STARTER_CATALOG_ENABLED:true}
  oauth:
    google:
      # Comma-separated list of accepted audiences: Android, iOS, and Web OAuth
      # client IDs — any of the three is a valid ID-token audience.
      client-ids: ${OAUTH_GOOGLE_CLIENT_IDS:}
      # Google's published JWKS endpoint — override only for pointing at a
      # local mock JWKS server in a non-prod environment.
      jwks-uri: ${OAUTH_GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
  openfoodfacts:
    base-url: ${OPENFOODFACTS_BASE_URL:https://world.openfoodfacts.org}
    # OpenFoodFacts requires a descriptive User-Agent identifying the app and a
    # contact. Override the contact in deployments via OPENFOODFACTS_USER_AGENT.
    user-agent: ${OPENFOODFACTS_USER_AGENT:Lifey/1.0 (hunorkonczey@gmail.com)}
  mail:
    # Resend's shared test domain — works without owning/verifying a domain,
    # but only delivers to the email address the RESEND_API_KEY account was
    # signed up with. Switch to a verified domain address once one exists.
    from: ${MAIL_FROM:onboarding@resend.dev}
    # Off by default (no RESEND_API_KEY locally) — the sender logs instead of
    # sending so local dev and tests never require a real Resend account.
    enabled: ${MAIL_ENABLED:false}
    resend-api-key: ${RESEND_API_KEY:}
  push:
    apns:
      # Off by default — no bean is created (see ApnsPushSender's
      # @ConditionalOnProperty), so local dev/CI never need a real APNs key.
      enabled: ${PUSH_APNS_ENABLED:false}
      # Path to the .p8 token-auth signing key downloaded from the Apple
      # Developer portal (Keys > Push Notifications).
      key-path: ${PUSH_APNS_KEY_PATH:}
      key-id: ${PUSH_APNS_KEY_ID:}
      team-id: ${PUSH_APNS_TEAM_ID:}
      bundle-id: ${PUSH_APNS_BUNDLE_ID:com.khunor.lifey}
      # True for development-signed builds (Xcode debug); false in production.
      sandbox: ${PUSH_APNS_SANDBOX:true}
    fcm:
      # Off by default — no Firebase beans are created (see FcmConfig's
      # @ConditionalOnProperty), so local dev/CI never need real Firebase
      # credentials.
      enabled: ${PUSH_FCM_ENABLED:false}
      # Path to the Firebase service-account JSON key (Firebase console >
      # Project settings > Service accounts > Generate new private key).
      credentials-path: ${PUSH_FCM_CREDENTIALS_PATH:}
  trainer-invite:
    # Optional email channel for accepting a trainer invite, alongside the
    # existing mobile polling flow (ClientInviteController). Off by default —
    # the mobile flow alone is unaffected either way.
    email-enabled: ${TRAINER_INVITE_EMAIL_ENABLED:false}
    # Used to build the accept/decline links in the invite email; the links
    # point back at this backend's own public endpoint, not a frontend route.
    public-base-url: ${TRAINER_INVITE_PUBLIC_BASE_URL:http://localhost:8080}
  jobs:
    password-reset-cleanup:
      # Daily sweep removing expired/used password reset tokens (PasswordResetTokenCleanupJob).
      cron: ${JOB_PASSWORD_RESET_CLEANUP_CRON:0 0 3 * * *}
    trainer-weekly-report:
      # Weekly trainer report email, every Monday (TrainerWeeklyReportJob).
      cron: ${JOB_TRAINER_WEEKLY_REPORT_CRON:0 0 5 * * MON}
    trainer-client-cleanup:
      # Daily sweep expiring stale PENDING trainer invites (TrainerClientCleanupJob).
      cron: ${JOB_TRAINER_CLIENT_CLEANUP_CRON:0 30 3 * * *}
    workout-reminder:
      # Per-user-local-time workout reminder tick, every 15 minutes (WorkoutReminderJob).
      cron: ${JOB_WORKOUT_REMINDER_CRON:0 */15 * * * *}
