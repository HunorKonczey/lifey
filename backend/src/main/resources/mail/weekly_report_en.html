<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly client report — Lifey</title>
</head>
<body style="font-family: sans-serif; color: #222;">
<h2 style="margin-bottom:4px;">Your weekly client report</h2>
<p style="color:#666; margin-top:0;">{{weekStart}} – {{weekEnd}}</p>
<table style="width:100%; border-collapse: collapse;">
    <thead>
    <tr>
        <th scope="col" style="text-align:left; padding:6px 0; border-bottom:2px solid #ddd; font-size:13px; color:#666;">Client summary</th>
    </tr>
    </thead>
    <tbody>
{{clientRows}}
    </tbody>
</table>
<p style="color:#999; font-size:12px; margin-top:24px;">You're receiving this because you have active clients on Lifey. You can turn this off from your admin dashboard.</p>
<p>— The Lifey team</p>
</body>
</html>
