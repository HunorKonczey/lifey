<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset your Lifey password</title>
</head>
<body style="font-family: sans-serif; color: #222;">
<p>Hi {{name}},</p>
<p>Your password reset code is:</p>
<p style="font-size: 24px; font-weight: bold; letter-spacing: 4px;">{{code}}</p>
<p>The code is valid for 15 minutes. If you didn't request a password reset, ignore this email — your password stays
    unchanged.</p>
<p>— The Lifey team</p>
</body>
</html>
