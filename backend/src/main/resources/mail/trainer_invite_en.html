<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer invite — Lifey</title>
</head>
<body style="font-family: sans-serif; color: #222;">
<p>Hi {{name}},</p>
<p><strong>{{trainerName}}</strong> invited you to be their client on Lifey.</p>
<p>
    <a href="{{acceptUrl}}" style="display:inline-block; padding:10px 20px; background:#2e7d32; color:#fff; text-decoration:none; border-radius:4px; margin-right:8px;">Accept invite</a>
    <a href="{{declineUrl}}" style="display:inline-block; padding:10px 20px; background:#757575; color:#fff; text-decoration:none; border-radius:4px;">Decline</a>
</p>
<p>You can also accept or decline this invite from the Lifey app. The invite expires in 24 hours.</p>
<p>— The Lifey team</p>
</body>
</html>
