[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Public, unauthenticated endpoint (see SecurityConfig.PUBLIC_ENDPOINTS) —
# used so Railway's healthcheck gets a 200 instead of a 401/403 from the JWT
# filter on every other route.
healthcheckPath = "/actuator/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
